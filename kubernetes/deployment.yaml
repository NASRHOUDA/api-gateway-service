apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: microservices
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: api-gateway
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: api-gateway
      containers:
      - name: api-gateway
        image: houdanasr/api-gateway-service:20
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: FRONTEND_URL
          value: "http://microservices.127.0.0.1.nip.io"
        - name: FRONTEND_SERVICE_URL
          value: "http://frontend-microservice:80"
        - name: AUTH_SERVICE_URL
          value: "http://authentication-service:5001"
        - name: USER_SERVICE_URL
          value: "http://user-service:5002"
        - name: TASK_SERVICE_URL
          value: "http://task-service:5003"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:5004"
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: INTERNAL_API_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 5000
          failureThreshold: 12
          periodSeconds: 10
